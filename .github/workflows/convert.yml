name: Convert YouTube to M4A

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTubeのURLを入力してください'
        required: true

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 最新版

      - name: Set up Python
        uses: actions/setup-python@v5 # v4からv5に更新（Node警告対策）
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Download and Convert
        run: python download.py "${{ github.event.inputs.video_url }}"

      # ZIPにせず、ファイルを直接「Release」として公開する設定
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest-download"
          files: output/*.m4a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
