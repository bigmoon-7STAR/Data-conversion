name: Convert YouTube to M4A

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTubeのURLを入力してください'
        required: true

# 権限エラーを防ぐためにここに直接権限を書きます
permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # これで警告を消せます
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Download and Convert
        run: python download.py "${{ github.event.inputs.video_url }}"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "latest"
          files: output/*.m4a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
